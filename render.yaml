services:
  - type: web
    name: cami-netherlands-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    envVars:
      - key: FLASK_ENV
        value: production
      - key: BASE_URL
        value: https://nl.centrocami.it
      - key: RESEND_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ADMIN_EMAIL
        value: info@centrocami.it
      - key: ADMIN_PASSWORD
        sync: false          # set manually
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false          # optional – enables CAMIX AI personalisation
      - key: CAMIX_DISPATCH_SECRET
        sync: false          # secret key for the daily cron job endpoint
      - key: PROGRAM_START_DATE
        value: 2026-07-05    # update before each cohort
      - key: PROGRAM_SESSION_HOUR
        value: "10"
      - key: PROGRAM_SESSION_DURATION
        value: "4"
      - key: PROGRAM_LOCATION
        value: Utrecht, Netherlands
    healthCheckPath: /api/health
    autoDeploy: true

  # ── CAMIX Daily Email Cron Job ──────────────────────────────────────────────
  # Fires every day at 07:00 UTC; Render Free tier supports cron jobs.
  - type: cron
    name: camix-daily-dispatch
    runtime: python
    rootDir: backend
    buildCommand: pip install requests
    schedule: "0 7 * * *"
    command: >
      python -c "
      import os, requests;
      secret = os.environ.get('CAMIX_DISPATCH_SECRET', '');
      url = os.environ.get('BASE_URL', 'https://nl.centrocami.it') + '/api/camix/daily-dispatch';
      r = requests.post(url, headers={'X-Camix-Secret': secret}, timeout=60);
      print(r.status_code, r.text[:500])
      "
    envVars:
      - key: BASE_URL
        value: https://nl.centrocami.it
      - key: CAMIX_DISPATCH_SECRET
        sync: false
